name: 'Setup Oz Environment'
description: 'Common setup steps for Oz workflows: optional app token, checkout, optional GCP auth, Python, and pip install.'

inputs:
  app-id:
    description: 'GitHub App ID for token creation. Leave empty to skip token creation.'
    required: false
    default: ''
  private-key:
    description: 'GitHub App private key for token creation. Leave empty to skip token creation.'
    required: false
    default: ''
  gcp-auth:
    description: 'Whether to authenticate to GCP and resolve the staging origin token.'
    required: false
    default: 'false'
  fetch-depth:
    description: 'Number of commits to fetch during checkout. Use 0 for full history.'
    required: false
    default: '1'

outputs:
  token:
    description: 'GitHub App token, if app-id and private-key were provided.'
    value: ${{ steps.app_token.outputs.token }}

runs:
  using: 'composite'
  steps:
    - name: Create GitHub App token
      if: inputs.app-id != '' && inputs.private-key != ''
      id: app_token
      uses: actions/create-github-app-token@v3
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}

    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        fetch-depth: ${{ inputs.fetch-depth }}

    - name: Authenticate to Google Cloud for staging secret access
      if: inputs.gcp-auth == 'true'
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: projects/643991131484/locations/global/workloadIdentityPools/github-actions/providers/warp-terraform

    - name: Set up Cloud SDK
      if: inputs.gcp-auth == 'true'
      uses: google-github-actions/setup-gcloud@v2

    - name: Resolve staging origin token
      if: inputs.gcp-auth == 'true'
      shell: bash
      run: |
        STAGING_ORIGIN_TOKEN="$(gcloud --project=warp-server-staging secrets versions access latest --secret=staging-origin-token)"
        echo "::add-mask::$STAGING_ORIGIN_TOKEN"
        {
          echo 'STAGING_ORIGIN_TOKEN<<EOF'
          printf '%s\n' "$STAGING_ORIGIN_TOKEN"
          echo EOF
        } >> "$GITHUB_ENV"

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python workflow dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r src/requirements.txt
