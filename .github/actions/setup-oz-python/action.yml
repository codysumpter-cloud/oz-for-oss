name: Set up Oz Python environment
description: >-
  Install the Python dependencies used by Oz workflow scripts. Uses uv with
  caching and provisions an activated virtual environment via setup-uv, so
  subsequent steps can invoke `python` directly without running into PEP 668
  externally-managed-interpreter errors on Ubuntu 24.04 runners.
inputs:
  requirements-path:
    description: Path to the requirements.txt file to install.
    required: false
    default: requirements.txt
  python-version:
    description: Python version for the uv-managed virtual environment.
    required: false
    default: "3.12"
runs:
  using: composite
  steps:
    - name: Install uv and activate virtual environment
      uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6
      with:
        enable-cache: true
        cache-dependency-glob: ${{ inputs.requirements-path }}
        activate-environment: true
        python-version: ${{ inputs.python-version }}
    - name: Install Python workflow dependencies
      shell: bash
      env:
        REQUIREMENTS_PATH: ${{ inputs.requirements-path }}
      run: uv pip install -r "$REQUIREMENTS_PATH"
