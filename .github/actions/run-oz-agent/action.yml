name: Run Oz agent with live session sharing updates
description: Install the Oz CLI, run an agent, and update a GitHub issue comment when a shared session URL appears.
inputs:
  prompt:
    description: Prompt for the Oz agent
    required: false
    default: ''
  saved_prompt:
    description: Saved prompt identifier for the Oz agent
    required: false
    default: ''
  skill:
    description: Skill for the Oz agent
    required: false
    default: ''
  model:
    description: Override model ID
    required: false
    default: ''
  name:
    description: Name for the agent run
    required: false
    default: ''
  mcp:
    description: MCP configuration JSON or file path
    required: false
    default: ''
  cwd:
    description: Working directory for the agent run
    required: false
    default: ''
  profile:
    description: Oz profile to use
    required: false
    default: ''
  output_format:
    description: Agent output format
    required: false
    default: text
  warp_api_key:
    description: Oz API key
    required: true
  share:
    description: Newline-delimited list of session share recipients
    required: false
    default: ''
  oz_channel:
    description: Oz release channel
    required: false
    default: stable
  oz_version:
    description: Oz CLI version
    required: false
    default: latest
  github_token:
    description: GitHub token used to update the issue comment
    required: false
    default: ''
  comment_id:
    description: Existing issue comment ID to update with the session URL
    required: false
    default: ''
  status_message:
    description: Status line to preserve when updating the issue comment
    required: false
    default: ''
  comment_metadata:
    description: Metadata marker to preserve on the issue comment
    required: false
    default: ''
outputs:
  session_url:
    description: Shared session URL detected from the Oz run output
    value: ${{ steps.run_oz.outputs.session_url }}
runs:
  using: composite
  steps:
    - name: Install Oz CLI
      shell: bash
      env:
        INPUT_OZ_CHANNEL: ${{ inputs.oz_channel }}
        INPUT_OZ_VERSION: ${{ inputs.oz_version }}
      run: |
        bash "$GITHUB_ACTION_PATH/install-oz.sh"
    - name: Run Oz CLI
      id: run_oz
      shell: bash
      env:
        INPUT_PROMPT: ${{ inputs.prompt }}
        INPUT_SAVED_PROMPT: ${{ inputs.saved_prompt }}
        INPUT_SKILL: ${{ inputs.skill }}
        INPUT_MODEL: ${{ inputs.model }}
        INPUT_NAME: ${{ inputs.name }}
        INPUT_MCP: ${{ inputs.mcp }}
        INPUT_CWD: ${{ inputs.cwd }}
        INPUT_PROFILE: ${{ inputs.profile }}
        INPUT_OUTPUT_FORMAT: ${{ inputs.output_format }}
        INPUT_WARP_API_KEY: ${{ inputs.warp_api_key }}
        INPUT_SHARE: ${{ inputs.share }}
        INPUT_OZ_CHANNEL: ${{ inputs.oz_channel }}
        INPUT_GITHUB_TOKEN: ${{ inputs.github_token }}
        INPUT_COMMENT_ID: ${{ inputs.comment_id }}
        INPUT_STATUS_MESSAGE: ${{ inputs.status_message }}
        INPUT_COMMENT_METADATA: ${{ inputs.comment_metadata }}
      run: |
        node "$GITHUB_ACTION_PATH/run-oz-agent.mjs"
