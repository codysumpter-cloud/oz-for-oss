name: Comment on Ready to Implement
on:
  workflow_call:
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
jobs:
  post_comment:
    name: Post ready-to-implement comment on issue
    runs-on: ubuntu-slim
    permissions:
      issues: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Post ready-to-implement comment
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
        run: |
          set -euo pipefail
          ISSUE_NUMBER=$(cat "$GITHUB_EVENT_PATH" | jq -r '.issue.number')
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "This issue has been labeled \`ready-to-implement\`. Contributions involving code changes are welcome."
