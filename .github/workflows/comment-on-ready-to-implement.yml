name: Comment on Ready to Implement
on:
  issues:
    types: [labeled]
concurrency:
  group: comment-on-ready-to-implement-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false
jobs:
  post_comment:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'ready-to-implement' &&
      !contains(github.event.issue.assignees.*.login, 'oz-agent')
    name: Post ready-to-implement comment on issue
    runs-on: ubuntu-slim
    permissions:
      issues: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Post ready-to-implement comment
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "This issue has been labeled \`ready-to-implement\`. Contributions involving code changes are welcome."
