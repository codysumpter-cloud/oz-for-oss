name: Create Implementation from Issue

on:
  issues:
    types: [assigned, labeled]

concurrency:
  group: create-implementation-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create_implementation:
    if: (github.event.action == 'assigned' && github.event.assignee.login == 'oz-agent' && contains(github.event.issue.labels.*.name, 'ready-to-implement')) || (github.event.action == 'labeled' && github.event.label.name == 'ready-to-implement' && contains(github.event.issue.assignees.*.login, 'oz-agent'))
    name: Create implementation diff
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python automation dependencies
        run: python -m pip install -r .github/python/requirements.txt
      - name: Create implementation with Python automation
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: .github/python
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_ENVIRONMENT_ID || '' }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
        run: python -m oz_automation create-implementation-from-issue
