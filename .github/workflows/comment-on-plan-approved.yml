name: Comment on Plan Approved
on:
  pull_request_target:
    types: [labeled]
concurrency:
  group: comment-on-plan-approved-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false
jobs:
  post_comment:
    if: >-
      github.event.label.name == 'plan-approved' &&
      github.event.pull_request.state == 'open'
    name: Post plan-approved comment on linked issue
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Resolve linked issue and post comment
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail

          IS_SPEC_ONLY=$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json files \
            --jq '(.files | length) > 0 and all(.files[].path; startswith("specs/"))')

          if [ "$IS_SPEC_ONLY" != "true" ]; then
            echo "::notice::PR #$PR_NUMBER changes files outside specs/, skipping."
            exit 0
          fi

          ISSUE_NUMBER=$(gh pr view "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --json closingIssuesReferences \
            --jq '.closingIssuesReferences[0].number // empty')

          if [ -z "$ISSUE_NUMBER" ]; then
            echo "::notice::No linked issue found for PR #$PR_NUMBER, skipping."
            exit 0
          fi

          PR_URL="https://github.com/$GITHUB_REPOSITORY/pull/$PR_NUMBER"
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "A spec for this issue has been approved in [PR #${PR_NUMBER}](${PR_URL}). Future implementations of this issue should use the approved spec as the basis for implementation."
