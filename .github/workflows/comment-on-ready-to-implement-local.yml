name: Comment on Ready to Implement (Local)
on:
  issues:
    types: [labeled]
concurrency:
  group: comment-on-ready-to-implement-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false
jobs:
  post_comment:
    if: >-
      github.event.action == 'labeled' &&
      github.event.label.name == 'ready-to-implement' &&
      !contains(github.event.issue.assignees.*.login, 'oz-agent')
    name: Post ready-to-implement comment on issue
    permissions:
      issues: write
    uses: ./.github/workflows/comment-on-ready-to-implement.yml
    secrets: inherit
