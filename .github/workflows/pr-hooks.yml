name: PR Hooks
on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string
      focus:
        description: Optional extra focus guidance for the review
        required: false
        default: ""
        type: string
concurrency:
  group: pr-hooks-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false
jobs:
  resolve_review_context:
    if: >-
      github.event_name != 'pull_request_target' &&
      (
        (github.event_name != 'issue_comment' && github.event_name != 'pull_request_review_comment') || (
          github.event.comment.user.type != 'Bot' &&
          !endsWith(github.event.comment.user.login, '[bot]')
        )
      )
    runs-on: ubuntu-slim
    outputs:
      should_review: ${{ steps.resolve.outputs.should_review }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      trigger_source: ${{ steps.resolve.outputs.trigger_source }}
      requester: ${{ steps.resolve.outputs.requester }}
      focus: ${{ steps.resolve.outputs.focus }}
      comment_id: ${{ steps.resolve.outputs.comment_id }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Set up Oz Python environment
        uses: ./.github/actions/setup-oz-python
      - name: Resolve review context
        id: resolve
        env:
          PYTHONPATH: .github/scripts
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number || '' }}
          DISPATCH_FOCUS: ${{ inputs.focus || '' }}
        run: python .github/scripts/resolve_review_context.py
  enforce_issue_state:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action != 'synchronize' &&
      github.event.pull_request.state == 'open'
    uses: ./.github/workflows/enforce-pr-issue-state.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      requester: ${{ github.actor }}
    secrets: inherit
  run_tests_after_enforcement:
    needs: [enforce_issue_state]
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action != 'synchronize' &&
      github.event.pull_request.state == 'open' &&
      needs.enforce_issue_state.outputs.allow_review == 'true'
    uses: ./.github/workflows/run-tests.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
  run_tests_on_push:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'synchronize' &&
      github.event.pull_request.state == 'open'
    uses: ./.github/workflows/run-tests.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
  review_pr_after_enforcement:
    needs: [enforce_issue_state]
    # Skip the downstream PR review when the enforcement job already
    # posted an agent review via the non-member review gate. That gate
    # leaves its own APPROVE or REQUEST_CHANGES review on the PR, so
    # running the general review flow here would post a second,
    # duplicate review from oz-agent.
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action != 'synchronize' &&
      github.event.pull_request.draft == false &&
      !startsWith(github.event.pull_request.head.ref, 'cherrypick') &&
      needs.enforce_issue_state.outputs.allow_review == 'true' &&
      needs.enforce_issue_state.outputs.agent_verdict == ''
    uses: ./.github/workflows/review-pull-request.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      trigger_source: pull_request_target
      requester: ${{ github.actor }}
    secrets: inherit
  review_pr_on_demand:
    needs: [resolve_review_context]
    if: >-
      github.event_name != 'pull_request_target' &&
      needs.resolve_review_context.outputs.should_review == 'true'
    uses: ./.github/workflows/review-pull-request.yml
    with:
      pr_number: ${{ needs.resolve_review_context.outputs.pr_number }}
      trigger_source: ${{ needs.resolve_review_context.outputs.trigger_source }}
      requester: ${{ needs.resolve_review_context.outputs.requester }}
      focus: ${{ needs.resolve_review_context.outputs.focus }}
      comment_id: ${{ needs.resolve_review_context.outputs.comment_id }}
    secrets: inherit
