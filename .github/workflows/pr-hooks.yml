name: PR Hooks
on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string
jobs:
  resolve_review_context:
    if: >-
      github.event_name != 'pull_request_target' &&
      (
        (github.event_name != 'issue_comment' && github.event_name != 'pull_request_review_comment') || (
          github.event.comment.user.type != 'Bot' &&
          !endsWith(github.event.comment.user.login, '[bot]')
        )
      )
    runs-on: ubuntu-slim
    permissions:
      # ``resolve_review_context.py`` reads PR comments to throttle
      # explicit ``/oz-review`` invocations; it does not post anything
      # back to the PR.
      contents: read
      pull-requests: read
      issues: read
    outputs:
      should_review: ${{ steps.resolve.outputs.should_review }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      trigger_source: ${{ steps.resolve.outputs.trigger_source }}
      requester: ${{ steps.resolve.outputs.requester }}
      comment_id: ${{ steps.resolve.outputs.comment_id }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Set up Oz Python environment
        uses: ./.github/actions/setup-oz-python
      - name: Resolve review context
        id: resolve
        env:
          PYTHONPATH: .github/scripts
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number || '' }}
          # Lets ``resolve_review_context.py`` count prior ``/oz-review``
          # invocations on the PR so the workflow can cap explicit
          # invocations at ``MAX_EXPLICIT_INVOCATIONS_PER_PR`` per PR.
          GH_TOKEN: ${{ github.token }}
        run: python .github/scripts/resolve_review_context.py
  enforce_issue_state:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action != 'synchronize' &&
      github.event.pull_request.state == 'open'
    uses: ./.github/workflows/enforce-pr-issue-state.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      requester: ${{ github.actor }}
    secrets: inherit
  run_tests_after_enforcement:
    needs: [enforce_issue_state]
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action != 'synchronize' &&
      github.event.pull_request.state == 'open' &&
      needs.enforce_issue_state.outputs.allow_review == 'true'
    uses: ./.github/workflows/run-tests.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
  run_tests_on_push:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'synchronize' &&
      github.event.pull_request.state == 'open'
    uses: ./.github/workflows/run-tests.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
  review_pr_after_enforcement:
    needs: [enforce_issue_state]
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action != 'synchronize' &&
      github.event.pull_request.draft == false &&
      needs.enforce_issue_state.outputs.allow_review == 'true'
    # Keep direct review runs serialized per PR without preventing the
    # upstream enforcement gate from running on every webhook delivery.
    concurrency:
      group: pr-review-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    uses: ./.github/workflows/review-pull-request.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      trigger_source: pull_request_target
      requester: ${{ github.actor }}
    secrets: inherit
  review_pr_on_demand:
    needs: [resolve_review_context]
    if: >-
      github.event_name != 'pull_request_target' &&
      needs.resolve_review_context.outputs.should_review == 'true'
    # Allow every comment/review-comment delivery to resolve whether it
    # requested a review, then serialize only the runs that actually do.
    concurrency:
      group: pr-review-${{ needs.resolve_review_context.outputs.pr_number }}
      cancel-in-progress: false
    uses: ./.github/workflows/review-pull-request.yml
    with:
      pr_number: ${{ needs.resolve_review_context.outputs.pr_number }}
      trigger_source: ${{ needs.resolve_review_context.outputs.trigger_source }}
      requester: ${{ needs.resolve_review_context.outputs.requester }}
      comment_id: ${{ needs.resolve_review_context.outputs.comment_id }}
    secrets: inherit
