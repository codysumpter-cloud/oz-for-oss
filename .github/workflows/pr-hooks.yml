name: PR Hooks
on:
  pull_request_target:
    types: [opened, reopened, ready_for_review, synchronize, review_requested, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string
      focus:
        description: Optional extra focus guidance for the review
        required: false
        default: ""
        type: string
concurrency:
  group: pr-hooks-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false
jobs:
  resolve_review_context:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-slim
    outputs:
      should_review: ${{ steps.resolve.outputs.should_review }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      trigger_source: ${{ steps.resolve.outputs.trigger_source }}
      requester: ${{ steps.resolve.outputs.requester }}
      focus: ${{ steps.resolve.outputs.focus }}
      comment_id: ${{ steps.resolve.outputs.comment_id }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Python workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .github/scripts/requirements.txt
      - name: Resolve review context
        id: resolve
        env:
          PYTHONPATH: .github/scripts
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number || '' }}
          DISPATCH_FOCUS: ${{ inputs.focus || '' }}
        run: python .github/scripts/resolve_review_context.py
  enforce_issue_state:
    if: >-
      github.event_name == 'pull_request_target' &&
      (
        github.event.action == 'opened' ||
        github.event.action == 'reopened' ||
        github.event.action == 'ready_for_review'
      ) &&
      github.event.pull_request.state == 'open'
    uses: ./.github/workflows/enforce-pr-issue-state.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      requester: ${{ github.actor }}
    secrets: inherit
  run_tests_after_enforcement:
    needs: [enforce_issue_state]
    if: >-
      github.event_name == 'pull_request_target' &&
      (
        github.event.action == 'opened' ||
        github.event.action == 'reopened' ||
        github.event.action == 'ready_for_review'
      ) &&
      github.event.pull_request.state == 'open' &&
      needs.enforce_issue_state.outputs.allow_review == 'true'
    uses: ./.github/workflows/run-tests.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
  run_tests_on_push:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'synchronize' &&
      github.event.pull_request.state == 'open'
    uses: ./.github/workflows/run-tests.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
  review_pr_after_enforcement:
    needs: [enforce_issue_state]
    if: >-
      github.event_name == 'pull_request_target' &&
      (
        github.event.action == 'opened' ||
        github.event.action == 'reopened' ||
        github.event.action == 'ready_for_review'
      ) &&
      github.event.pull_request.draft == false &&
      !startsWith(github.event.pull_request.head.ref, 'cherrypick') &&
      needs.enforce_issue_state.outputs.allow_review == 'true'
    uses: ./.github/workflows/review-pull-request.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      trigger_source: pull_request_target
      requester: ${{ github.actor }}
    secrets: inherit
  review_pr_on_explicit_request:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.state == 'open' &&
      !startsWith(github.event.pull_request.head.ref, 'cherrypick') &&
      (
        (
          github.event.action == 'review_requested' &&
          (
            github.event.requested_reviewer.login == 'warp-agent' ||
            github.event.requested_reviewer.login == 'oz-agent'
          )
        ) ||
        (
          github.event.action == 'labeled' &&
          (
            github.event.label.name == 'warp-review' ||
            github.event.label.name == 'oz-review'
          )
        )
      )
    uses: ./.github/workflows/review-pull-request.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      trigger_source: pull_request_target
      requester: ${{ github.actor }}
    secrets: inherit
  review_pr_on_demand:
    needs: [resolve_review_context]
    if: >-
      github.event_name != 'pull_request_target' &&
      needs.resolve_review_context.outputs.should_review == 'true'
    uses: ./.github/workflows/review-pull-request.yml
    with:
      pr_number: ${{ needs.resolve_review_context.outputs.pr_number }}
      trigger_source: ${{ needs.resolve_review_context.outputs.trigger_source }}
      requester: ${{ needs.resolve_review_context.outputs.requester }}
      focus: ${{ needs.resolve_review_context.outputs.focus }}
      comment_id: ${{ needs.resolve_review_context.outputs.comment_id }}
    secrets: inherit
