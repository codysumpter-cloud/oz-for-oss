name: PR Hooks
on:
  pull_request_target:
    types: [opened, reopened, edited, synchronize, ready_for_review]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string
      focus:
        description: Optional extra focus guidance for the review
        required: false
        default: ""
        type: string
concurrency:
  group: pr-hooks-${{ github.event.pull_request.number || github.event.issue.number || inputs.pr_number || github.run_id }}
  cancel-in-progress: false
jobs:
  resolve_review_context:
    if: github.event_name != 'pull_request_target'
    runs-on: ubuntu-latest
    outputs:
      should_review: ${{ steps.resolve.outputs.should_review }}
      pr_number: ${{ steps.resolve.outputs.pr_number }}
      trigger_source: ${{ steps.resolve.outputs.trigger_source }}
      requester: ${{ steps.resolve.outputs.requester }}
      focus: ${{ steps.resolve.outputs.focus }}
      comment_id: ${{ steps.resolve.outputs.comment_id }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python automation dependencies
        run: python -m pip install -r .github/python/requirements.txt
      - name: Resolve review context
        id: resolve
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PYTHONPATH: .github/python
          DISPATCH_PR_NUMBER: ${{ inputs.pr_number || '' }}
          DISPATCH_FOCUS: ${{ inputs.focus || '' }}
        run: python -m oz_automation resolve-review-context

  enforce_issue_state:
    if: github.event_name == 'pull_request_target' && github.event.pull_request.state == 'open'
    uses: ./.github/workflows/enforce-pr-issue-state.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit

  review_pr_after_enforcement:
    needs: [enforce_issue_state]
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.draft == false &&
      !startsWith(github.event.pull_request.head.ref, 'cherrypick') &&
      needs.enforce_issue_state.outputs.allow_review == 'true'
    uses: ./.github/workflows/warp_review_pr.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
      trigger_source: pull_request_target
      requester: ${{ github.actor }}
    secrets: inherit

  review_pr_on_demand:
    needs: [resolve_review_context]
    if: >-
      github.event_name != 'pull_request_target' &&
      needs.resolve_review_context.outputs.should_review == 'true'
    uses: ./.github/workflows/warp_review_pr.yml
    with:
      pr_number: ${{ needs.resolve_review_context.outputs.pr_number }}
      trigger_source: ${{ needs.resolve_review_context.outputs.trigger_source }}
      requester: ${{ needs.resolve_review_context.outputs.requester }}
      focus: ${{ needs.resolve_review_context.outputs.focus }}
      comment_id: ${{ needs.resolve_review_context.outputs.comment_id }}
    secrets: inherit
