name: Run Tests
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to test
        required: true
        type: string
jobs:
  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check for non-markdown changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          has_code=true
          if files=$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}/files" --jq '.[].filename') && [ -n "$files" ]; then
            has_code=false
            while IFS= read -r file; do
              if [[ ! "$file" =~ \.md$ ]]; then
                has_code=true
                break
              fi
            done <<< "$files"
          fi
          echo "has_code_changes=$has_code" >> "$GITHUB_OUTPUT"
      - name: Checkout PR
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: actions/checkout@v5
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge
      - name: Lint GitHub Actions workflows
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color
      - name: Set up Oz Python environment
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: ./.github/actions/setup-oz-python
      - name: Run tests
        if: steps.filter.outputs.has_code_changes == 'true'
        env:
          PYTHONPATH: .github/scripts
        run: python -m unittest discover -s .github/scripts/tests
