name: Run Tests
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to test
        required: true
        type: string
jobs:
  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check for non-markdown changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          has_code=true
          if files=$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}/files" --jq '.[].filename') && [ -n "$files" ]; then
            has_code=false
            while IFS= read -r file; do
              if [[ ! "$file" =~ \.md$ ]]; then
                has_code=true
                break
              fi
            done <<< "$files"
          fi
          echo "has_code_changes=$has_code" >> "$GITHUB_OUTPUT"
      - name: Checkout PR
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge
      - name: Set up Python
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/requirements.txt
      - name: Install dependencies
        if: steps.filter.outputs.has_code_changes == 'true'
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt
      - name: Run tests
        if: steps.filter.outputs.has_code_changes == 'true'
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s src/tests
