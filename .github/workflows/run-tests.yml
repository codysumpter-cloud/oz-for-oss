name: Run Tests
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to test
        required: true
        type: string
jobs:
  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: src/requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt
      - name: Run tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s src/tests
