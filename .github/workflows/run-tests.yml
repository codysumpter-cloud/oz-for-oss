name: Run Tests
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to test
        required: true
        type: string
jobs:
  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check for non-markdown changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          has_code=true
          if files=$(gh api --paginate "repos/${{ github.repository }}/pulls/${{ inputs.pr_number }}/files" --jq '.[].filename') && [ -n "$files" ]; then
            has_code=false
            while IFS= read -r file; do
              if [[ ! "$file" =~ \.md$ ]]; then
                has_code=true
                break
              fi
            done <<< "$files"
          fi
          echo "has_code_changes=$has_code" >> "$GITHUB_OUTPUT"
      - name: Checkout PR
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: refs/pull/${{ inputs.pr_number }}/merge
      - name: Lint GitHub Actions workflows
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color
      - name: Set up Oz Python environment
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: ./.github/actions/setup-oz-python
      - name: Run tests
        if: steps.filter.outputs.has_code_changes == 'true'
        env:
          # Include `lib` so PRs that have already moved
          # `oz_workflows` to the new top-level `lib/` location
          # (per the webhook control-plane migration) can still
          # import it. Non-existent path entries are ignored, so
          # this stays safe for PRs that have not migrated yet.
          PYTHONPATH: lib:.github/scripts
        run: python -m unittest discover -s .github/scripts/tests
