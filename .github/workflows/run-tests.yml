name: Run Tests
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch: {}
concurrency:
  group: run-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  run_tests:
    name: Run tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check for non-markdown changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          has_code=true
          pr_number="${{ github.event.pull_request.number }}"
          if [ -n "$pr_number" ] && files=$(gh api --paginate "repos/${{ github.repository }}/pulls/${pr_number}/files" --jq '.[].filename') && [ -n "$files" ]; then
            has_code=false
            while IFS= read -r file; do
              if [[ ! "$file" =~ \.md$ ]]; then
                has_code=true
                break
              fi
            done <<< "$files"
          fi
          echo "has_code_changes=$has_code" >> "$GITHUB_OUTPUT"
      - name: Checkout PR
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Lint GitHub Actions workflows
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: docker://rhysd/actionlint:1.7.12@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: -color
      - name: Set up Oz Python environment
        if: steps.filter.outputs.has_code_changes == 'true'
        uses: ./.github/actions/setup-oz-python
      - name: Install test dependencies
        if: steps.filter.outputs.has_code_changes == 'true'
        # pytest + pytest-subtests are test-only and intentionally
        # excluded from requirements.txt so the Vercel function bundle
        # stays lean. Install them here so the webhook control-plane
        # tests can run with subtest reporting.
        run: uv pip install 'pytest>=8,<9' 'pytest-subtests>=0.13,<1'
      - name: Run webhook control-plane tests
        if: steps.filter.outputs.has_code_changes == 'true'
        run: python -m pytest tests
      - name: Run shared helper unit tests
        if: steps.filter.outputs.has_code_changes == 'true'
        env:
          PYTHONPATH: lib:.github/scripts
        run: python -m unittest discover -s .github/scripts/tests
