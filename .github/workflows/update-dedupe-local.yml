name: Update Dedupe Skill (Local)
on:
  schedule:
    - cron: '30 9 * * 1'  # Every Monday at 09:30 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Number of days to look back for closed-as-duplicate signals
        required: false
        default: '7'
        type: string
jobs:
  update_dedupe:
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-dedupe.yml
    with:
      lookback_days: ${{ github.event.inputs.lookback_days || '7' }}
      workflow_code_ref: ${{ github.workflow_sha }}
    secrets: inherit
