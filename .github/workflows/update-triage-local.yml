name: Update Triage Skill (Local)
on:
  schedule:
    - cron: '15 9 * * 1'  # Every Monday at 09:15 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Number of days to look back for triage feedback
        required: false
        default: '7'
        type: string
jobs:
  update_triage:
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/update-triage.yml
    with:
      lookback_days: ${{ github.event.inputs.lookback_days || '7' }}
    secrets: inherit
