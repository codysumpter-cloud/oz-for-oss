name: Auto PR Review Logic
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string
      trigger_source:
        description: Source that requested the review
        required: true
        type: string
      requester:
        description: Login of the user who requested the review, if any
        required: false
        default: ""
        type: string
      focus:
        description: Optional extra focus guidance for the review
        required: false
        default: ""
        type: string
      comment_id:
        description: Issue comment ID to react to for slash-command reviews
        required: false
        default: ""
        type: string
jobs:
  review_pr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python automation dependencies
        run: python -m pip install -r .github/python/requirements.txt
      - name: Run PR review with Python automation
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GH_TOKEN: ${{ github.token }}
          PYTHONPATH: .github/python
          PR_NUMBER: ${{ inputs.pr_number }}
          TRIGGER_SOURCE: ${{ inputs.trigger_source }}
          REQUESTER: ${{ inputs.requester }}
          REVIEW_FOCUS: ${{ inputs.focus }}
          COMMENT_ID: ${{ inputs.comment_id }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_ENVIRONMENT_ID || '' }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
        run: python -m oz_automation review-pr
