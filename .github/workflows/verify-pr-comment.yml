name: Verify PR Comment
on:
  workflow_call:
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
      OSS_WARP_API_KEY:
        required: true
jobs:
  # ``author_association`` is scoped to the repository, so an actual org
  # member may still report as ``CONTRIBUTOR``. Gate `/oz-verify` on either
  # the static allowlist OR a positive ``GET /orgs/{org}/members/{login}``
  # probe so legitimate maintainers are not dropped.
  check_trust:
    name: Check commenter trust
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/oz-verify') &&
      github.event.comment.user.type != 'Bot' &&
      !endsWith(github.event.comment.user.login, '[bot]')
    runs-on: ubuntu-slim
    outputs:
      trusted: ${{ steps.evaluate.outputs.trusted }}
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Evaluate commenter trust
        id: evaluate
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          ASSOCIATION: ${{ github.event.comment.author_association }}
          ACTOR: ${{ github.event.comment.user.login }}
          ORG: ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          case "${ASSOCIATION:-}" in
            OWNER|MEMBER|COLLABORATOR)
              echo "Treating @${ACTOR} as trusted via author_association=${ASSOCIATION}."
              echo "trusted=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac
          if gh api --silent "/orgs/${ORG}/members/${ACTOR}" 2>/dev/null; then
            echo "Treating @${ACTOR} as trusted via /orgs/${ORG}/members (association=${ASSOCIATION})."
            echo "trusted=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Ignoring /oz-verify from @${ACTOR}; not an org member (association=${ASSOCIATION})."
            echo "trusted=false" >> "$GITHUB_OUTPUT"
          fi
  verify:
    needs: check_trust
    if: needs.check_trust.outputs.trusted == 'true'
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}
      - name: Run PR verification workflow
        uses: warpdotdev/oz-for-oss/.github/actions/run-oz-python-script@main # main
        with:
          script-path: verify_pr_comment.py
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
          WARP_API_KEY: ${{ secrets.OSS_WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
          WARP_API_BASE_URL: https://app.warp.dev/api/v1
