name: Trigger Implementation on Plan Approved
on:
  workflow_call:
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
      WARP_API_KEY:
        required: true
jobs:
  trigger_implementation:
    name: Trigger implementation for approved plan
    runs-on: ubuntu-slim
    permissions:
      contents: write
      issues: write
      pull-requests: write
    env:
      WORKFLOW_CODE_REPOSITORY: warpdotdev/oz-for-oss
      WORKFLOW_CODE_REF: ${{ github.repository == 'warpdotdev/oz-for-oss' && github.sha || 'main' }}
      WORKFLOW_CODE_PATH: __oz_shared
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Checkout workflow code
        uses: actions/checkout@v5
        with:
          repository: ${{ env.WORKFLOW_CODE_REPOSITORY }}
          ref: ${{ env.WORKFLOW_CODE_REF }}
          path: ${{ env.WORKFLOW_CODE_PATH }}
          token: ${{ steps.app_token.outputs.token }}
      - name: Set up Oz Python environment
        uses: warpdotdev/oz-for-oss/.github/actions/setup-oz-python@main
        with:
          requirements-path: ${{ env.WORKFLOW_CODE_PATH }}/.github/scripts/requirements.txt
      - name: Run trigger-implementation-on-plan-approved workflow
        env:
          PYTHONPATH: ${{ env.WORKFLOW_CODE_PATH }}/.github/scripts
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
          WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
          WARP_API_BASE_URL: https://app.warp.dev/api/v1
        run: python "${{ env.WORKFLOW_CODE_PATH }}/.github/scripts/trigger_implementation_on_plan_approved.py"
