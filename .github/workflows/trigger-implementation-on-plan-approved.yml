name: Trigger Implementation on Plan Approved
on:
  workflow_call:
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
      WARP_API_KEY:
        required: true
jobs:
  trigger_implementation:
    name: Trigger implementation for approved plan
    runs-on: ubuntu-slim
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Run trigger-implementation-on-plan-approved workflow
        uses: warpdotdev/oz-for-oss/.github/actions/run-oz-python-script@main # main
        with:
          script-path: trigger_implementation_on_plan_approved.py
          workflow-ref: ${{ github.workflow_sha }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
          WARP_API_BASE_URL: https://app.warp.dev/api/v1
