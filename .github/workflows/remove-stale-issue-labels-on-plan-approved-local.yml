name: Remove Stale Issue Labels on Plan Approved (Local)
on:
  pull_request_target:
    types: [labeled]
concurrency:
  group: remove-stale-labels-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true
jobs:
  remove_stale_labels:
    if: github.event.label.name == 'plan-approved'
    permissions:
      contents: read
      issues: write
      pull-requests: read
    uses: ./.github/workflows/remove-stale-issue-labels-on-plan-approved.yml
    with:
      pr_number: ${{ github.event.pull_request.number }}
    secrets: inherit
