name: Enforce PR Issue State Logic
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to evaluate
        required: true
        type: string
      requester:
        description: Login of the user whose action triggered enforcement, if any
        required: false
        default: ""
        type: string
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
      WARP_API_KEY:
        required: true
    outputs:
      allow_review:
        description: Whether downstream PR hooks may continue after enforcement.
        value: ${{ jobs.enforce_issue_state.outputs.allow_review }}
jobs:
  enforce_issue_state:
    name: Enforce PR issue state
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
      pull-requests: write
    outputs:
      allow_review: ${{ steps.run_enforcement.outputs.allow_review }}
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Run PR issue-state enforcement
        id: run_enforcement
        uses: warpdotdev/oz-for-oss/.github/actions/run-oz-python-script@main # main
        with:
          script-path: enforce_pr_issue_state.py
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REQUESTER: ${{ inputs.requester }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
          WARP_API_BASE_URL: https://app.warp.dev/api/v1
