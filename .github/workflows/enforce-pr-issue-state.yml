name: Enforce PR Issue State Logic
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to evaluate
        required: true
        type: string
      requester:
        description: Login of the user whose action triggered enforcement, if any
        required: false
        default: ""
        type: string
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
      WARP_API_KEY:
        required: true
    outputs:
      allow_review:
        description: Whether downstream PR hooks may continue after enforcement.
        value: ${{ jobs.enforce_issue_state.outputs.allow_review }}
jobs:
  enforce_issue_state:
    name: Enforce PR issue state
    runs-on: ubuntu-slim
    env:
      WORKFLOW_CODE_REPOSITORY: warpdotdev/oz-for-oss
      WORKFLOW_CODE_REF: ${{ github.repository == 'warpdotdev/oz-for-oss' && github.sha || 'main' }}
      WORKFLOW_CODE_PATH: __oz_shared
    permissions:
      contents: read
      id-token: write
      issues: write
      pull-requests: write
    outputs:
      allow_review: ${{ steps.run_enforcement.outputs.allow_review }}
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Checkout workflow code
        uses: actions/checkout@v5
        with:
          repository: ${{ env.WORKFLOW_CODE_REPOSITORY }}
          ref: ${{ env.WORKFLOW_CODE_REF }}
          path: ${{ env.WORKFLOW_CODE_PATH }}
          token: ${{ steps.app_token.outputs.token }}
      - name: Authenticate to Google Cloud for staging secret access
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/643991131484/locations/global/workloadIdentityPools/github-actions/providers/warp-terraform
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Resolve staging origin token
        id: staging_origin_token
        run: |
          token="$(gcloud --project=warp-server-staging secrets versions access latest --secret=staging-origin-token)"
          printf '::add-mask::%s\n' "$token"
          {
            echo 'token<<EOF'
            printf '%s\n' "$token"
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Set up Oz Python environment
        uses: ./.github/actions/setup-oz-python
        with:
          requirements-path: ${{ env.WORKFLOW_CODE_PATH }}/.github/scripts/requirements.txt
      - name: Run PR issue-state enforcement
        id: run_enforcement
        env:
          PYTHONPATH: ${{ env.WORKFLOW_CODE_PATH }}/.github/scripts
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          REQUESTER: ${{ inputs.requester }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
          WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
          STAGING_ORIGIN_TOKEN: ${{ steps.staging_origin_token.outputs.token }}
        run: python "${{ env.WORKFLOW_CODE_PATH }}/.github/scripts/enforce_pr_issue_state.py"
