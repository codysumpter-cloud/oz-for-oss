name: Update PR Review Skill (Local)
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Number of days to look back for PR feedback
        required: false
        default: '7'
        type: string
jobs:
  update_pr_review:
    permissions:
      contents: write
      pull-requests: write
    uses: ./.github/workflows/update-pr-review.yml
    with:
      lookback_days: ${{ github.event.inputs.lookback_days || '7' }}
    secrets: inherit
