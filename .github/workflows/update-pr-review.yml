name: Update PR Review Skill
on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 09:00 UTC
  workflow_dispatch:
    inputs:
      lookback_days:
        description: Number of days to look back for PR feedback
        required: false
        default: '7'
        type: string
jobs:
  update_pr_review:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GHA_APP_ID }}
          private-key: ${{ secrets.GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud for staging secret access
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/643991131484/locations/global/workloadIdentityPools/github-actions/providers/warp-terraform
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Resolve staging origin token
        run: |
          STAGING_ORIGIN_TOKEN="$(gcloud --project=warp-server-staging secrets versions access latest --secret=staging-origin-token)"
          echo "::add-mask::$STAGING_ORIGIN_TOKEN"
          {
            echo 'STAGING_ORIGIN_TOKEN<<EOF'
            printf '%s\n' "$STAGING_ORIGIN_TOKEN"
            echo EOF
          } >> "$GITHUB_ENV"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt
      - name: Run update PR review workflow
        env:
          PYTHONPATH: src
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          LOOKBACK_DAYS: ${{ inputs.lookback_days || '7' }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
          WARP_AGENT_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_ENVIRONMENT_ID || '' }}
          WARP_AGENT_REVIEW_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_REVIEW_ENVIRONMENT_ID || '' }}
        run: python src/update_pr_review.py
