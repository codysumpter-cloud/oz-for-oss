name: Review Pull Request
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
        type: string
      trigger_source:
        description: Source that requested the review
        required: true
        type: string
      requester:
        description: Login of the user who requested the review, if any
        required: false
        default: ""
        type: string
      focus:
        description: Optional extra focus guidance for the review
        required: false
        default: ""
        type: string
      comment_id:
        description: Issue comment ID to react to for slash-command reviews
        required: false
        default: ""
        type: string
    secrets:
      GHA_APP_ID:
        required: true
      GHA_PRIVATE_KEY:
        required: true
      WARP_API_KEY:
        required: true
jobs:
  review_pr:
    runs-on: ubuntu-latest
    env:
      WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
      WARP_AGENT_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_ENVIRONMENT_ID || vars.WARP_ENVIRONMENT_ID || '' }}
      WARP_AGENT_REVIEW_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_REVIEW_ENVIRONMENT_ID || '' }}
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      issues: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GHA_APP_ID }}
          private-key: ${{ secrets.GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Authenticate to Google Cloud for staging secret access
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/643991131484/locations/global/workloadIdentityPools/github-actions/providers/warp-terraform
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Resolve staging origin token
        run: |
          STAGING_ORIGIN_TOKEN="$(gcloud --project=warp-server-staging secrets versions access latest --secret=staging-origin-token)"
          echo "::add-mask::$STAGING_ORIGIN_TOKEN"
          {
            echo 'STAGING_ORIGIN_TOKEN<<EOF'
            printf '%s\n' "$STAGING_ORIGIN_TOKEN"
            echo EOF
          } >> "$GITHUB_ENV"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt
      - name: Run PR review workflow
        env:
          PYTHONPATH: src
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
          TRIGGER_SOURCE: ${{ inputs.trigger_source }}
          REQUESTER: ${{ inputs.requester || github.actor }}
          REVIEW_FOCUS: ${{ inputs.focus }}
          COMMENT_ID: ${{ inputs.comment_id }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_PROFILE: ${{ vars.WARP_AGENT_PROFILE || '' }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
        run: python src/review_pr.py
