name: Review Pull Request
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number to review
        required: false
        default: ""
        type: string
      trigger_source:
        description: Source that requested the review
        required: false
        default: ""
        type: string
      requester:
        description: Login of the user who requested the review, if any
        required: false
        default: ""
        type: string
      focus:
        description: Optional extra focus guidance for the review
        required: false
        default: ""
        type: string
      comment_id:
        description: Issue comment ID to react to for slash-command reviews
        required: false
        default: ""
        type: string
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
      WARP_API_KEY:
        required: true
  pull_request_target:
    types:
      - opened
      - ready_for_review
      - review_requested
      - labeled
jobs:
  review_pr:
    runs-on: ubuntu-slim
    env:
      WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
      WORKFLOW_CODE_REPOSITORY: warpdotdev/oz-for-oss
      WORKFLOW_CODE_REF: ${{ github.repository == 'warpdotdev/oz-for-oss' && github.sha || 'main' }}
      WORKFLOW_CODE_PATH: __oz_shared
    permissions:
      contents: read
      id-token: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
      - name: Resolve review context
        id: resolve
        env:
          INPUT_PR_NUMBER: ${{ inputs.pr_number || '' }}
          INPUT_TRIGGER_SOURCE: ${{ inputs.trigger_source || '' }}
          INPUT_REQUESTER: ${{ inputs.requester || '' }}
          INPUT_FOCUS: ${{ inputs.focus || '' }}
          INPUT_COMMENT_ID: ${{ inputs.comment_id || '' }}
          GITHUB_ACTOR_LOGIN: ${{ github.actor }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path
          event = json.loads(Path(os.environ["GITHUB_EVENT_PATH"]).read_text())
          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          input_pr_number = os.environ.get("INPUT_PR_NUMBER", "").strip()
          pr = event.get("pull_request") or {}
          head_ref = ((pr.get("head") or {}).get("ref") or "").strip()
          action = (event.get("action") or "").strip()
          requested_reviewer = ((event.get("requested_reviewer") or {}).get("login") or "").strip()
          label_name = ((event.get("label") or {}).get("name") or "").strip()
          has_pr_hooks = Path(".github/workflows/pr-hooks.yml").exists()
          trigger_source = os.environ.get("INPUT_TRIGGER_SOURCE", "").strip() or event_name
          requester = os.environ.get("INPUT_REQUESTER", "").strip() or os.environ.get("GITHUB_ACTOR_LOGIN", "")
          focus = os.environ.get("INPUT_FOCUS", "")
          comment_id = os.environ.get("INPUT_COMMENT_ID", "")
          pr_number = input_pr_number or str(pr.get("number") or "")
          matches_direct_trigger = (
              (action == "opened" and not pr.get("draft", False))
              or action == "ready_for_review"
              or (action == "review_requested" and requested_reviewer in {"warp-agent", "oz-agent"})
              or (action == "labeled" and label_name in {"warp-review", "oz-review"})
          )
          if input_pr_number:
              should_run = True
          elif head_ref.startswith("cherrypick"):
              should_run = False
          elif has_pr_hooks and event_name == "pull_request_target":
              should_run = False
          else:
              should_run = matches_direct_trigger and bool(pr_number)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"should_run={'true' if should_run else 'false'}\n")
              fh.write(f"pr_number={pr_number}\n")
              fh.write(f"trigger_source={trigger_source}\n")
              fh.write(f"requester={requester}\n")
              fh.write("focus<<__EOF__\n")
              fh.write(focus)
              fh.write("\n__EOF__\n")
              fh.write(f"comment_id={comment_id}\n")
              if has_pr_hooks and event_name == "pull_request_target" and not input_pr_number:
                  fh.write("skip_reason=pr-hooks-present\n")
              elif head_ref.startswith("cherrypick"):
                  fh.write("skip_reason=cherrypick-branch\n")
              elif not should_run:
                  fh.write("skip_reason=event-not-enabled\n")
          PY
      - name: Create GitHub App token
        if: steps.resolve.outputs.should_run == 'true'
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout workflow code
        if: steps.resolve.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ env.WORKFLOW_CODE_REPOSITORY }}
          ref: ${{ env.WORKFLOW_CODE_REF }}
          path: ${{ env.WORKFLOW_CODE_PATH }}
          token: ${{ steps.app_token.outputs.token }}
      - name: Authenticate to Google Cloud for staging secret access
        if: steps.resolve.outputs.should_run == 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/643991131484/locations/global/workloadIdentityPools/github-actions/providers/warp-terraform
      - name: Set up Cloud SDK
        if: steps.resolve.outputs.should_run == 'true'
        uses: google-github-actions/setup-gcloud@v2
      - name: Resolve staging origin token
        if: steps.resolve.outputs.should_run == 'true'
        id: staging_origin_token
        run: |
          token="$(gcloud --project=warp-server-staging secrets versions access latest --secret=staging-origin-token)"
          printf '::add-mask::%s\n' "$token"
          {
            echo 'token<<EOF'
            printf '%s\n' "$token"
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Set up Oz Python environment
        if: steps.resolve.outputs.should_run == 'true'
        uses: warpdotdev/oz-for-oss/.github/actions/setup-oz-python@main
        with:
          requirements-path: ${{ env.WORKFLOW_CODE_PATH }}/.github/scripts/requirements.txt
      - name: Skip direct trigger because PR hooks are present
        if: steps.resolve.outputs.should_run != 'true' && steps.resolve.outputs.skip_reason == 'pr-hooks-present'
        run: echo "PR review orchestration skipped because .github/workflows/pr-hooks.yml is present."
      - name: Run PR review workflow
        if: steps.resolve.outputs.should_run == 'true'
        env:
          PYTHONPATH: ${{ env.WORKFLOW_CODE_PATH }}/.github/scripts
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr_number }}
          TRIGGER_SOURCE: ${{ steps.resolve.outputs.trigger_source }}
          REQUESTER: ${{ steps.resolve.outputs.requester }}
          REVIEW_FOCUS: ${{ steps.resolve.outputs.focus }}
          COMMENT_ID: ${{ steps.resolve.outputs.comment_id }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
          WARP_API_BASE_URL: https://staging.warp.dev/api/v1
          WARP_ORIGIN_TOKEN_ENV_NAME: STAGING_ORIGIN_TOKEN
          STAGING_ORIGIN_TOKEN: ${{ steps.staging_origin_token.outputs.token }}
        run: python "${{ env.WORKFLOW_CODE_PATH }}/.github/scripts/review_pr.py"
