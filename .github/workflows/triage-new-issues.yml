name: Triage New Issues
on:
  workflow_call:
    inputs:
      issue_number:
        description: Optional issue number to triage immediately
        required: false
        default: ''
        type: string
      lookback_minutes:
        description: Minutes of issue history to scan when no issue number is provided
        required: false
        default: '60'
        type: string
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
      OSS_WARP_API_KEY:
        required: true
jobs:
  triage_issues:
    if: >-
      github.event_name != 'issue_comment' || (
        github.event.comment.user.type != 'Bot' &&
        !endsWith(github.event.comment.user.login, '[bot]')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
      - name: Run issue triage workflow
        uses: warpdotdev/oz-for-oss/.github/actions/run-oz-python-script@main # main
        with:
          script-path: triage_new_issues.py
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          GH_APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
          LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '60' }}
          TRIAGE_ISSUE_NUMBER: ${{ inputs.issue_number || '' }}
          WARP_API_KEY: ${{ secrets.OSS_WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
          WARP_REVIEW_TRIAGE_ENVIRONMENT_ID: ${{ vars.WARP_REVIEW_TRIAGE_ENVIRONMENT_ID || '' }}
          WARP_API_BASE_URL: https://app.warp.dev/api/v1
