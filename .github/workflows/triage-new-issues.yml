name: Triage New Issues
on:
  issues:
    types: [opened]
  schedule:
    - cron: '0 * * * *'
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Optional issue number to triage immediately
        required: false
        default: ''
        type: string
      lookback_minutes:
        description: Minutes of issue history to scan when no issue number is provided
        required: false
        default: '60'
        type: string
concurrency:
  group: triage-new-issues-${{ github.event.issue.number || inputs.issue_number || github.run_id }}
  cancel-in-progress: false
jobs:
  triage_issues:
    if: github.event_name != 'issue_comment' || (!github.event.issue.pull_request && contains(github.event.comment.body, '@oz-agent'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    steps:
      - name: Setup Oz environment
        id: setup
        uses: ./.github/actions/setup-oz-env
        with:
          app-id: ${{ secrets.GHA_APP_ID }}
          private-key: ${{ secrets.GHA_PRIVATE_KEY }}
          gcp-auth: 'true'
          fetch-depth: '0'
      - name: Run issue triage workflow
        env:
          PYTHONPATH: src
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          LOOKBACK_MINUTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.lookback_minutes || '60' }}
          TRIAGE_ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number || '' }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_PROFILE: ${{ vars.WARP_AGENT_PROFILE || '' }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
          WARP_AGENT_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_ENVIRONMENT_ID || '' }}
          WARP_AGENT_TRIAGE_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_TRIAGE_ENVIRONMENT_ID || '' }}
        run: python src/triage_new_issues.py
