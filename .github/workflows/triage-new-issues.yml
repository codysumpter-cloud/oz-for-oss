name: Triage New Issues
on:
  workflow_call:
    inputs:
      issue_number:
        description: Optional issue number to triage immediately
        required: false
        default: ''
        type: string
      lookback_minutes:
        description: Minutes of issue history to scan when no issue number is provided
        required: false
        default: '60'
        type: string
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
      WARP_API_KEY:
        required: true
jobs:
  triage_issues:
    if: >-
      github.event_name != 'issue_comment' || (
        github.event.comment.user.type != 'Bot' &&
        !endsWith(github.event.comment.user.login, '[bot]')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      WORKFLOW_CODE_REPOSITORY: warpdotdev/oz-for-oss
      WORKFLOW_CODE_REF: ${{ github.workflow_sha }}
      WORKFLOW_CODE_PATH: __oz_shared
      TRIAGE_IMAGE: oz-for-oss-triage
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Checkout workflow code
        uses: actions/checkout@v5
        with:
          repository: ${{ env.WORKFLOW_CODE_REPOSITORY }}
          ref: ${{ env.WORKFLOW_CODE_REF }}
          path: ${{ env.WORKFLOW_CODE_PATH }}
          token: ${{ steps.app_token.outputs.token }}
      - name: Build triage agent container
        run: |
          docker build \
            -f ${{ env.WORKFLOW_CODE_PATH }}/docker/triage/Dockerfile \
            -t ${{ env.TRIAGE_IMAGE }} \
            ${{ env.WORKFLOW_CODE_PATH }}
      - name: Set up Oz Python environment
        uses: warpdotdev/oz-for-oss/.github/actions/setup-oz-python@main
        with:
          requirements-path: ${{ env.WORKFLOW_CODE_PATH }}/.github/scripts/requirements.txt
      - name: Run issue triage workflow
        env:
          PYTHONPATH: ${{ env.WORKFLOW_CODE_PATH }}/.github/scripts
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          LOOKBACK_MINUTES: ${{ inputs.lookback_minutes || '60' }}
          TRIAGE_ISSUE_NUMBER: ${{ inputs.issue_number || '' }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_API_BASE_URL: https://app.warp.dev/api/v1
        run: python "${{ env.WORKFLOW_CODE_PATH }}/.github/scripts/triage_new_issues.py"
