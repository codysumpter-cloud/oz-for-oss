name: Triage New Issues
on:
  issues:
    types: [opened]
  schedule:
    - cron: '0 * * * *'
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Optional issue number to triage immediately
        required: false
        default: ''
        type: string
      lookback_minutes:
        description: Minutes of issue history to scan when no issue number is provided
        required: false
        default: '60'
        type: string
concurrency:
  group: triage-new-issues-${{ github.event.issue.number || inputs.issue_number || github.run_id }}
  cancel-in-progress: false
jobs:
  triage_issues:
    if: |
      (
        github.event_name != 'issue_comment' &&
        !contains(github.event.issue.labels.*.name, 'triaged')
      ) || (
        github.event_name == 'issue_comment' &&
        !github.event.issue.pull_request &&
        (
          contains(github.event.comment.body, '@oz-agent') ||
          (
            contains(github.event.issue.labels.*.name, 'needs-info') &&
            github.event.comment.user.login == github.event.issue.user.login
          )
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      issues: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GHA_APP_ID }}
          private-key: ${{ secrets.GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Authenticate to Google Cloud for staging secret access
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/643991131484/locations/global/workloadIdentityPools/github-actions/providers/warp-terraform
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Resolve staging origin token
        run: |
          STAGING_ORIGIN_TOKEN="$(gcloud --project=warp-server-staging secrets versions access latest --secret=staging-origin-token)"
          echo "::add-mask::$STAGING_ORIGIN_TOKEN"
          {
            echo 'STAGING_ORIGIN_TOKEN<<EOF'
            printf '%s\n' "$STAGING_ORIGIN_TOKEN"
            echo EOF
          } >> "$GITHUB_ENV"
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r src/requirements.txt
      - name: Run issue triage workflow
        env:
          PYTHONPATH: src
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          LOOKBACK_MINUTES: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.lookback_minutes || '60' }}
          TRIAGE_ISSUE_NUMBER: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.issue_number || '' }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_PROFILE: ${{ vars.WARP_AGENT_PROFILE || '' }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
          WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
        run: python src/triage_new_issues.py
