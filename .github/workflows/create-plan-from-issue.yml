name: Create Plan from Issue

on:
  issues:
    types: [assigned, labeled]

concurrency:
  group: create-plan-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create_plan:
    if: (github.event.action == 'assigned' && github.event.assignee.login == 'oz-agent' && contains(github.event.issue.labels.*.name, 'ready-to-plan')) || (github.event.action == 'labeled' && github.event.label.name == 'ready-to-plan' && contains(github.event.issue.assignees.*.login, 'oz-agent'))
    name: Create plan diff
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Construct prompt
        id: prompt
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => label.name).join(', ') || 'None';
            const assignees = issue.assignees.map(assignee => assignee.login).join(', ') || 'None';

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              per_page: 100,
            });

            const orgMemberComments = comments.filter(comment =>
              ['MEMBER', 'OWNER'].includes(comment.author_association)
            );

            let commentsNote = 'There are no previous comments from organization members on this issue.';
            if (orgMemberComments.length) {
              const commentsText = orgMemberComments
                .map(comment => `- ${comment.user?.login || 'unknown'} (${comment.created_at}): ${comment.body}`)
                .join('\n');
              fs.writeFileSync('issue_comments.txt', commentsText, 'utf8');
              commentsNote = 'Previous issue comments from organization members are available in `issue_comments.txt`.';
            }

            const prompt = `Create a plan-only diff for GitHub Issue #${issue.number}.

            Issue Details:
            - Title: ${issue.title}
            - Labels: ${labels}
            - Assignees: ${assignees}
            - Description: ${issue.body || 'No description provided.'}

            Previous Issue Comments:
            - ${commentsNote}

            Additional Instructions:
            - Use the repository's local \`create-plan\` skill as the base workflow.
            - Store the resulting plan in the repository's \`plans/\` directory.
            - Write a concise markdown summary for the eventual pull request body to \`plan_summary.md\` in the repository root.
            - Research the codebase enough to produce a grounded implementation plan.
            - Treat \`issue_comments.txt\` and \`plan_summary.md\` as temporary context only and do not include them in committed changes.
            - Do not implement the feature itself in this run.
            - Do not create a branch, commit, push, or open a pull request. Only produce the repository diff, the summary file, and a concise summary of the plan.`;

            core.setOutput('prompt', prompt);

      - name: Validate Warp API key
        env:
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
        run: |
          if [ -z "$WARP_API_KEY" ]; then
            echo "::error::Missing WARP_API_KEY GitHub Actions secret."
            exit 1
          fi

          case "$WARP_API_KEY" in
            wk-*) ;;
            *)
              echo "::error::WARP_API_KEY appears malformed. Expected a Warp API key starting with 'wk-'."
              exit 1
              ;;
          esac
      - name: Run Oz Agent
        id: agent
        uses: warpdotdev/oz-agent-action@v1
        env:
          GH_TOKEN: ${{ github.token }}
        with:
          skill: create-plan
          prompt: ${{ steps.prompt.outputs.prompt }}
          name: Create plan for issue #${{ github.event.issue.number }}
          profile: ${{ vars.WARP_AGENT_PROFILE || '' }}
          output_format: text
          model: ${{ vars.WARP_AGENT_MODEL || '' }}
          mcp: ${{ vars.WARP_AGENT_MCP || '' }}
          warp_api_key: ${{ secrets.WARP_API_KEY }}
      - name: Prepare plan branch
        if: success()
        id: prepare_pr
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          SUMMARY_FILE: plan_summary.md
        run: |
          rm -f issue_comments.txt

          if [[ -z $(git status --porcelain -- plans) ]]; then
            echo "No changes made by Oz Agent."
            if [[ -f "$SUMMARY_FILE" ]]; then
              {
                printf 'I analyzed this issue but did not produce a plan diff.\n\n'
                cat "$SUMMARY_FILE"
              } > no_diff_comment.md
              gh issue comment "$ISSUE_NUMBER" --body-file no_diff_comment.md
            else
              gh issue comment "$ISSUE_NUMBER" --body "I analyzed this issue but did not produce a plan diff."
            fi
            echo "should_create_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BRANCH_NAME="oz-agent/plan-issue-$ISSUE_NUMBER"


          git config user.name "Oz Agent"
          git config user.email "oz-agent@warp.dev"

          git checkout -B "$BRANCH_NAME"
          git add plans
          git commit -m "Add plan for issue #$ISSUE_NUMBER" -m "Co-Authored-By: Oz <oz-agent@warp.dev>"
          git push origin "$BRANCH_NAME" --force
          echo "should_create_pr=true" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create PR from plan diff
        if: steps.prepare_pr.outputs.should_create_pr == 'true'
        id: create_pr
        uses: actions/github-script@v7
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          BRANCH_NAME: ${{ steps.prepare_pr.outputs.branch_name }}
          SUMMARY_FILE: plan_summary.md
        with:
          github-token: ${{ github.token }}
          script: |
            const fs = require('fs');
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            const issueTitle = process.env.ISSUE_TITLE;
            const defaultBranch = process.env.DEFAULT_BRANCH;
            const branchName = process.env.BRANCH_NAME;
            const summaryFile = process.env.SUMMARY_FILE;
            const summaryBody = fs.existsSync(summaryFile)
              ? fs.readFileSync(summaryFile, 'utf8').trim()
              : '';
            const prBody = summaryBody
              ? [
                  `This PR adds an implementation plan for Issue #${issueNumber}.`,
                  '',
                  summaryBody,
                  '',
                  `Refs #${issueNumber}`,
                  '',
                  'Co-Authored-By: Oz <oz-agent@warp.dev>',
                ].join('\n')
              : undefined;

            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Plan issue #${issueNumber}: ${issueTitle}`,
                head: branchName,
                base: defaultBranch,
                body: prBody,
                draft: true,
              });

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: `I created a draft plan PR for this issue: ${pr.html_url}`,
              });

              core.setOutput('pr_url', pr.html_url);
            } catch (error) {
              const message = error?.message || String(error);


              core.setFailed(`Failed to create draft PR: ${message}`);
            }

