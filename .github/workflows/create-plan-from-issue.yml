name: Create Plan from Issue
on:
  issues:
    types: [assigned, labeled]
  issue_comment:
    types: [created]
concurrency:
  group: create-plan-issue-${{ github.event.issue.number }}
  cancel-in-progress: false
jobs:
  create_plan:
    if: (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'oz-agent' && contains(github.event.issue.labels.*.name, 'ready-to-plan')) || (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'ready-to-plan' && contains(github.event.issue.assignees.*.login, 'oz-agent')) || (github.event_name == 'issue_comment' && !github.event.issue.pull_request && contains(github.event.issue.labels.*.name, 'ready-to-plan') && contains(github.event.comment.body, '@oz-agent') && (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER'))
    name: Create plan diff
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Setup Oz environment
        id: setup
        uses: ./.github/actions/setup-oz-env
        with:
          app-id: ${{ secrets.GHA_APP_ID }}
          private-key: ${{ secrets.GHA_PRIVATE_KEY }}
          gcp-auth: 'true'
          fetch-depth: '0'
      - name: Run create-plan workflow
        env:
          PYTHONPATH: src
          GH_TOKEN: ${{ steps.setup.outputs.token }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_PROFILE: ${{ vars.WARP_AGENT_PROFILE || '' }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
          WARP_AGENT_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_ENVIRONMENT_ID || '' }}
          WARP_AGENT_PLAN_ENVIRONMENT_ID: ${{ vars.WARP_AGENT_PLAN_ENVIRONMENT_ID || '' }}
        run: python src/create_plan_from_issue.py
