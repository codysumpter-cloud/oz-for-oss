name: Comment on Unready Assigned Issue

on:
  issues:
    types: [assigned]

concurrency:
  group: comment-on-unready-assigned-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  comment_when_unready:
    if: github.event.assignee.login == 'oz-agent' && !contains(github.event.issue.labels.*.name, 'ready-to-plan') && !contains(github.event.issue.labels.*.name, 'ready-to-implement')
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python automation dependencies
        run: python -m pip install -r .github/python/requirements.txt
      - name: Create unready assignment comment
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PYTHONPATH: .github/python
        run: python -m oz_automation comment-on-unready-issue
