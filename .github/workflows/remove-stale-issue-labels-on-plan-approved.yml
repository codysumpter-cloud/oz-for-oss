name: Remove Stale Issue Labels on Plan Approved
on:
  workflow_call:
    inputs:
      pr_number:
        description: Pull request number that was labeled plan-approved
        required: true
        type: string
    secrets:
      OZ_MGMT_GHA_APP_ID:
        required: true
      OZ_MGMT_GHA_PRIVATE_KEY:
        required: true
jobs:
  remove_stale_labels:
    name: Remove stale issue labels
    runs-on: ubuntu-slim
    permissions:
      contents: read
      issues: write
      pull-requests: read
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - name: Remove stale issue labels
        uses: warpdotdev/oz-for-oss/.github/actions/run-oz-python-script@main # main
        with:
          script-path: remove_stale_issue_labels_on_plan_approved.py
          workflow-ref: ${{ github.workflow_sha }}
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          PR_NUMBER: ${{ inputs.pr_number }}
