name: Respond to PR Comment
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
concurrency:
  group: respond-to-pr-comment-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false
jobs:
  respond:
    if: >-
      contains(github.event.comment.body, '@oz-agent') &&
      contains(fromJSON('["COLLABORATOR","MEMBER","OWNER"]'), github.event.comment.author_association) &&
      github.event.comment.user.login != 'github-actions[bot]' &&
      (github.event_name == 'pull_request_review_comment' || (github.event_name == 'issue_comment' && github.event.issue.pull_request))
    name: Respond to PR comment
    runs-on: ubuntu-slim
    permissions:
      contents: write
      id-token: write
      issues: write
      pull-requests: write
    steps:
      - name: Create GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.OZ_MGMT_GHA_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.OZ_MGMT_GHA_PRIVATE_KEY }}
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Authenticate to Google Cloud for staging secret access
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/643991131484/locations/global/workloadIdentityPools/github-actions/providers/warp-terraform
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
      - name: Resolve staging origin token
        id: staging_origin_token
        run: |
          token="$(gcloud --project=warp-server-staging secrets versions access latest --secret=staging-origin-token)"
          printf '::add-mask::%s\n' "$token"
          {
            echo 'token<<EOF'
            printf '%s\n' "$token"
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install Python workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r .github/scripts/requirements.txt
      - name: Run respond-to-pr-comment workflow
        env:
          PYTHONPATH: .github/scripts
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          WARP_API_KEY: ${{ secrets.WARP_API_KEY }}
          WARP_AGENT_MODEL: ${{ vars.WARP_AGENT_MODEL || '' }}
          WARP_AGENT_MCP: ${{ vars.WARP_AGENT_MCP || '' }}
          WARP_ENVIRONMENT_ID: ${{ vars.WARP_ENVIRONMENT_ID || '' }}
          STAGING_ORIGIN_TOKEN: ${{ steps.staging_origin_token.outputs.token }}
        run: python .github/scripts/respond_to_pr_comment.py
